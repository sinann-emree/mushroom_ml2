<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantar Analiz Sistemi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .form-group { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; font-size: 0.9em; }
        select { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 5px; background: white; font-size: 14px; }
        select:focus { outline: none; border-color: #3498db; box-shadow: 0 0 5px rgba(52,152,219,0.3); }

        .btn-container { text-align: center; margin-top: 30px; }
        button { background-color: #27ae60; color: white; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: transform 0.2s, background 0.2s; box-shadow: 0 5px 15px rgba(39,174,96,0.3); }
        button:hover { background-color: #2ecc71; transform: translateY(-2px); }
        
        #result { margin-top: 30px; padding: 20px; border-radius: 10px; text-align: center; font-size: 1.4em; font-weight: bold; display: none; }
        .safe { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .poison { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍄 Mantar Analiz Sistemi</h1>
    <p class="subtitle">Makine Öğrenmesi ile Zehirli/Yenilebilir Tahmini</p>

    <form id="predictionForm">
        <div class="grid-container" id="formGrid">
            </div>
        <div class="btn-container">
            <button type="submit">ANALİZ ET</button>
        </div>
    </form>

    <div id="result"></div>
</div>

<script>
    // Modelin eğitildiği sütun sırasına göre Türkçe seçenekler
    // One-Hot Encoding öncesi ham veri değerleri
    const features = {
        'cap-shape': { label: 'Şapka Şekli', options: {'b': 'Çan', 'c': 'Konik', 'x': 'Dışbükey', 'f': 'Düz', 'k': 'Topuzlu', 's': 'Çukur'} },
        'cap-surface': { label: 'Şapka Yüzeyi', options: {'f': 'Lifli', 'g': 'Oluklu', 'y': 'Pullu', 's': 'Pürüzsüz'} },
        'cap-color': { label: 'Şapka Rengi', options: {'n': 'Kahverengi', 'b': 'Devetüyü', 'c': 'Gri', 'g': 'Yeşil', 'r': 'Pembe', 'p': 'Mor', 'u': 'Mor', 'e': 'Kırmızı', 'w': 'Beyaz', 'y': 'Sarı'} },
        'bruises': { label: 'Morarma', options: {'t': 'Var', 'f': 'Yok'} },
        'odor': { label: 'Koku', options: {'a': 'Badem', 'l': 'Anason', 'c': 'Krep', 'y': 'Balık', 'f': 'Pis', 'm': 'Küf', 'n': 'Yok', 'p': 'Keskin', 's': 'Baharatlı'} },
        'gill-spacing': { label: 'Lamel Aralığı', options: {'c': 'Yakın', 'w': 'Kalabalık', 'd': 'Uzak'} },
        'gill-size': { label: 'Lamel Boyutu', options: {'b': 'Geniş', 'n': 'Dar'} },
        'gill-color': { label: 'Lamel Rengi', options: {'k': 'Siyah', 'n': 'Kahverengi', 'b': 'Devetüyü', 'h': 'Çikolata', 'g': 'Gri', 'r': 'Yeşil', 'o': 'Turuncu', 'p': 'Pembe', 'u': 'Mor', 'e': 'Kırmızı', 'w': 'Beyaz', 'y': 'Sarı'} },
        'stalk-shape': { label: 'Sap Şekli', options: {'e': 'Genişleyen', 't': 'Daralan'} },
        'stalk-root': { label: 'Sap Kökü', options: {'b': 'Yumrulu', 'c': 'Kulüp', 'u': 'Fincan', 'e': 'Eşit', 'z': 'Köksü', 'r': 'Köklü', '?': 'Bilinmiyor'} },
        'stalk-surface-above-ring': { label: 'Halka Üstü Yüzey', options: {'f': 'Lifli', 'y': 'Pullu', 'k': 'İpeksi', 's': 'Pürüzsüz'} },
        'stalk-surface-below-ring': { label: 'Halka Altı Yüzey', options: {'f': 'Lifli', 'y': 'Pullu', 'k': 'İpeksi', 's': 'Pürüzsüz'} },
        'stalk-color-above-ring': { label: 'Halka Üstü Renk', options: {'n': 'Kahverengi', 'b': 'Devetüyü', 'c': 'Gri', 'g': 'Yeşil', 'r': 'Pembe', 'p': 'Mor', 'e': 'Kırmızı', 'w': 'Beyaz', 'y': 'Sarı'} },
        'stalk-color-below-ring': { label: 'Halka Altı Renk', options: {'n': 'Kahverengi', 'b': 'Devetüyü', 'c': 'Gri', 'g': 'Yeşil', 'r': 'Pembe', 'p': 'Mor', 'e': 'Kırmızı', 'w': 'Beyaz', 'y': 'Sarı'} },
        'ring-number': { label: 'Halka Sayısı', options: {'n': 'Yok', 'o': 'Bir', 't': 'İki'} },
        'ring-type': { label: 'Halka Tipi', options: {'c': 'Kırılgan', 'e': 'Alevlenen', 'f': 'Büyük', 'l': 'Gidici', 'n': 'Yok', 'p': 'Sarkık', 's': 'Kılıflı', 'z': 'Bölge'} },
        'spore-print-color': { label: 'Spor Rengi', options: {'k': 'Siyah', 'n': 'Kahverengi', 'b': 'Devetüyü', 'h': 'Çikolata', 'r': 'Yeşil', 'o': 'Turuncu', 'u': 'Mor', 'w': 'Beyaz', 'y': 'Sarı'} },
        'population': { label: 'Popülasyon', options: {'a': 'Bol', 'c': 'Küme', 'n': 'Çok', 's': 'Dağınık', 'v': 'Birkaç', 'y': 'Yalnız'} },
        'habitat': { label: 'Yaşam Alanı', options: {'g': 'Çayır', 'l': 'Yapraklar', 'm': 'Çayır', 'p': 'Yollar', 'u': 'Kentsel', 'w': 'Atık', 'd': 'Orman'} }
    };

    const grid = document.getElementById('formGrid');

    // Formu oluştur
    for (const [key, value] of Object.entries(features)) {
        const div = document.createElement('div');
        div.className = 'form-group';
        
        let optionsHtml = '';
        for (const [optKey, optVal] of Object.entries(value.options)) {
            optionsHtml += `<option value="${optKey}">${optVal}</option>`;
        }
        
        div.innerHTML = `
            <label>${value.label}</label>
            <select name="${key}" id="${key}">
                ${optionsHtml}
            </select>
        `;
        grid.appendChild(div);
    }

    // Gönderme İşlemi
    document.getElementById('predictionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.className = '';
        resultDiv.innerHTML = '⏳ Analiz ediliyor...';
        resultDiv.style.backgroundColor = '#f0f0f0';

        const formData = {};
        for (const key of Object.keys(features)) {
            formData[key] = document.getElementById(key).value;
        }

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            
            const data = await response.json();
            
            if (data.status === 'success') {
                resultDiv.innerHTML = `%${data.probability} olasılıkla ${data.prediction}`;
                if (data.prediction.includes('ZEHİRLİ')) {
                    resultDiv.className = 'poison';
                } else {
                    resultDiv.className = 'safe';
                }
            } else {
                resultDiv.innerHTML = 'Hata: ' + data.message;
            }
        } catch (error) {
            resultDiv.innerHTML = 'Sunucu hatası!';
        }
    });
</script>

</body>
</html>
